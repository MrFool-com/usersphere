<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UserSphere | Signup</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <section>

      <!-- BACKGROUND -->
      <img src="images/bg.jpg" class="bg" />
      <img src="images/trees.png" class="trees" />
      <img src="images/girl.png" class="girl" />

      <!-- LEAVES -->
      <div class="leaves">
        <div class="set">
        <!-- leaves sahi filenames -->
        <div><img src="images/leaf_01.png" /></div>
        <div><img src="images/leaf_02.png" /></div>
        <div><img src="images/leaf_03.png" /></div>
        <div><img src="images/leaf_04.png" /></div>
        <div><img src="images/leaf_01.png" /></div>
        <div><img src="images/leaf_02.png" /></div>
        <div><img src="images/leaf_03.png" /></div>
        <div><img src="images/leaf_04.png" /></div>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div class="login">
        <h2>Create Account</h2>

        <div class="inputBox">
          <input id="name" type="text" placeholder="Full Name" />
          <input id="email" type="email" placeholder="Email" />
          <input id="password" type="password" placeholder="Password" />
          <input id="btn" type="submit" value="Sign Up" />
          <div id="error" style="color:#8f2c24; font-size:13px; display:none;"></div>
        </div>

        <div class="group">
          <a href="#">&nbsp;</a>
          <a href="index.html">Login</a>
        </div>
      </div>

    </section>

    <script src="js/signup.js"></script>
  </body>
</html>
