<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UserSphere | Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section>
      <!-- Falling leaves animation -->
      <div class="leaves">
        <div class="set">
          <div><img src="images/leaf_01.png" /></div>
          <div><img src="images/leaf_02.png" /></div>
          <div><img src="images/leaf_03.png" /></div>
          <div><img src="images/leaf_04.png" /></div>
          <div><img src="images/leaf_01.png" /></div>
          <div><img src="images/leaf_02.png" /></div>
          <div><img src="images/leaf_03.png" /></div>
          <div><img src="images/leaf_04.png" /></div>
        </div>
      </div>

      <!-- Background visuals -->
      <img src="images/bg.jpg" class="bg" />
      <img src="images/girl.png" class="girl" />
      <img src="images/trees.png" class="trees" />

      <!-- LOGIN FORM -->
      <form id="loginForm" class="login">
        <h2>Sign In</h2>

        <!-- Email -->
        <div class="inputBox">
          <input
            id="email"
            type="email"
            placeholder="Email"
            autocomplete="username"
          />
        </div>

        <!-- Password -->
        <div class="inputBox">
          <input
            id="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
          />
        </div>

        <!-- Login Button -->
        <div class="inputBox">
          <input type="submit" id="btn" value="Login" />
        </div>

        <!-- Error message -->
        <div
          id="error"
          style="
            margin-top: -10px;
            color: #b21212;
            font-size: 14px;
            text-align: center;
            display: none;
          "
        >
          Invalid email or password
        </div>

        <!-- Links -->
        <div class="group">
          <a href="#">Forget Password</a>
          <a href="signup.html">Signup</a>
        </div>
      </form>
    </section>

    <!-- LOGIN LOGIC -->
    <script src="js/login.js"></script>
  </body>
</html>
