<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UserSphere | Profile</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(circle at 15% 15%, #f5f5f5 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, #eeeeee 0%, transparent 45%),
        #f0f0f0;
    }

    .profile-container {
      width: 100%; max-width: 820px;
      padding: 44px 48px;
      border-radius: 24px; position: relative;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 40px 80px rgba(0,0,0,0.10), 0 12px 30px rgba(0,0,0,0.07);
    }

    .profile-container::after {
      content: ""; position: absolute;
      bottom: -40px; left: 50%; transform: translateX(-50%);
      width: 70%; height: 60px;
      background: radial-gradient(rgba(0,0,0,0.15), transparent 70%);
      filter: blur(30px); z-index: -1;
    }

    /* ===== HEADER ===== */
    .profile-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 28px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .profile-header { display: flex; align-items: center; gap: 18px; }

    .avatar {
      width: 54px; height: 54px; border-radius: 50%;
      background: #8f2c24; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 22px; flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(143,44,36,0.3);
    }

    .profile-text h2 {
      font-size: 26px; font-weight: 700; color: #1a1a1a;
      letter-spacing: -0.5px; margin-bottom: 3px;
    }

    .profile-sub { font-size: 12px; color: #aaa; font-family: 'DM Mono', monospace; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      background: #fafaf9; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px; font-size: 13px; font-weight: 500;
      color: #555; text-decoration: none; transition: all 0.2s ease;
    }
    .back-btn:hover { background: #f0ece6; color: #1a1a1a; border-color: rgba(0,0,0,0.12); }

    /* ===== GRID ===== */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ===== CARDS ===== */
    .edit-card {
      background: #fafaf9; border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px; padding: 28px 24px;
      display: flex; flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .edit-card:hover { transform: translateY(-3px); box-shadow: 0 16px 32px rgba(0,0,0,0.08); }

    .card-title {
      font-size: 10px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace; margin-bottom: 20px;
    }

    /* ===== FORM ===== */
    .input-group { margin-bottom: 14px; }

    .input-group label {
      display: block; font-size: 11px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 7px;
    }

    .input-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e8e4e0; border-radius: 10px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      color: #1a1a1a; background: #fff; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-group input:focus { border-color: #8f2c24; box-shadow: 0 0 0 3px rgba(143,44,36,0.07); }
    .input-group input::placeholder { color: #c5bfb6; }

    .input-hint { font-size: 11.5px; color: #bbb; margin-top: 5px; line-height: 1.5; font-family: 'DM Mono', monospace; }

    /* ===== ACCOUNT INFO SECTION ===== */
    .info-section {
      margin-top: auto;
      padding-top: 18px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .info-section-label {
      font-size: 10px; font-weight: 600; color: #ccc;
      text-transform: uppercase; letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace; margin-bottom: 12px;
    }

    .info-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: #aaa; font-family: 'DM Mono', monospace; font-size: 11px; }
    .info-val   { color: #333; font-weight: 500; font-size: 13px; }

    .role-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
    }
    .role-user       { background: #e9f3ff; color: #2b6cb0; }
    .role-admin      { background: #fff4e5; color: #b7791f; }
    .role-superadmin { background: #fde8e8; color: #c53030; }

    /* ===== DIVIDER ===== */
    .pwd-divider {
      display: flex; align-items: center; gap: 8px; margin: 10px 0 14px;
    }
    .pwd-divider::before, .pwd-divider::after { content: ""; flex: 1; height: 1px; background: rgba(0,0,0,0.07); }
    .pwd-divider span { font-size: 10px; color: #bbb; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== ALERTS ===== */
    .alert {
      display: none; font-size: 13px; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 14px; align-items: center; gap: 8px;
    }
    .alert.show { display: flex; }
    .alert-error   { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
    .alert-success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }

    /* ===== BUTTON ===== */
    .save-btn {
      width: 100%; padding: 11px; margin-top: 20px;
      border: none; border-radius: 10px;
      background: #8f2c24; color: #fff;
      font-weight: 600; font-size: 13.5px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      box-shadow: 0 4px 14px rgba(143,44,36,0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
    }
    .save-btn:hover:not(:disabled) { background: #b03a30; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(143,44,36,0.35); }
    .save-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .save-btn .spinner {
      display: none; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    .save-btn.loading .spinner  { display: block; }
    .save-btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body { padding: 20px 14px; align-items: flex-start; }
      .profile-container { padding: 28px 20px; border-radius: 18px; }
      .profile-text h2 { font-size: 20px; }
      .profile-grid { grid-template-columns: 1fr; }
      .profile-top { flex-wrap: wrap; gap: 14px; }
    }
    @media (max-width: 480px) {
      .profile-container { padding: 22px 16px; }
      .avatar { width: 44px; height: 44px; font-size: 18px; }
    }
  </style>
</head>

<body>
  <div class="profile-container">

    <!-- HEADER -->
    <div class="profile-top">
      <div class="profile-header">
        <div class="avatar" id="avatar">U</div>
        <div class="profile-text">
          <h2 id="username">My Profile</h2>
          <span class="profile-sub" id="userEmail">—</span>
        </div>
      </div>
      <a href="/dashboard.html" class="back-btn">← Dashboard</a>
    </div>

    <!-- GRID -->
    <div class="profile-grid">

      <!-- ===== NAME CARD ===== -->
      <div class="edit-card">
        <div class="card-title">Update Name</div>

        <div id="name-error"   class="alert alert-error">  <span id="name-error-text"></span>   </div>
        <div id="name-success" class="alert alert-success"> <span id="name-success-text"></span> </div>

        <div class="input-group">
          <label for="newName">Full Name</label>
          <input type="text" id="newName" placeholder="Enter new name" autocomplete="off" />
        </div>

        <!-- Account details at bottom -->
        <div class="info-section">
          <div class="info-section-label">Account Details</div>
          <div class="info-item">
            <span class="info-label">Role</span>
            <span id="roleBadge" class="role-badge"></span>
          </div>
          <div class="info-item">
            <span class="info-label">Member since</span>
            <span id="memberSince" class="info-val">—</span>
          </div>
          <div class="info-item">
            <span class="info-label">Last login</span>
            <span id="lastLogin" class="info-val">—</span>
          </div>
        </div>

        <button class="save-btn" id="nameBtn">
          <div class="spinner"></div>
          <span class="btn-text">Save Name</span>
        </button>
      </div>

      <!-- ===== PASSWORD CARD ===== -->
      <div class="edit-card">
        <div class="card-title">Change Password</div>

        <div id="pwd-error"   class="alert alert-error">  <span id="pwd-error-text"></span>   </div>
        <div id="pwd-success" class="alert alert-success"> <span id="pwd-success-text"></span> </div>

        <div class="input-group">
          <label for="currentPwd">Current Password</label>
          <input type="password" id="currentPwd" placeholder="Your current password" />
        </div>

        <div class="pwd-divider"><span>new</span></div>

        <div class="input-group">
          <label for="newPwd">New Password</label>
          <input type="password" id="newPwd" placeholder="Min 8 characters" />
        </div>

        <div class="input-group">
          <label for="confirmPwd">Confirm New Password</label>
          <input type="password" id="confirmPwd" placeholder="Repeat new password" />
          <div class="input-hint">You'll be logged out after updating.</div>
        </div>

        <button class="save-btn" id="pwdBtn">
          <div class="spinner"></div>
          <span class="btn-text">Update Password</span>
        </button>
      </div>

    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
