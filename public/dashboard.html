<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UserSphere | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(circle at 15% 15%, #f5f5f5 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, #eeeeee 0%, transparent 45%),
        #f0f0f0;
    }

    /* ===== CONTAINER ===== */
    .dashboard-container {
      width: 100%;
      max-width: 820px;
      padding: 44px 48px;
      border-radius: 24px;
      position: relative;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow:
        0 40px 80px rgba(0,0,0,0.10),
        0 12px 30px rgba(0,0,0,0.07);
    }

    .dashboard-container::after {
      content: "";
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 60px;
      background: radial-gradient(rgba(0,0,0,0.15), transparent 70%);
      filter: blur(30px);
      z-index: -1;
    }

    /* ===== TOP SECTION ===== */
    .dashboard-top {
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #8f2c24;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(143,44,36,0.3);
    }

    .profile-text h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      margin-bottom: 3px;
    }

    .profile-sub {
      font-size: 13px;
      color: #999;
      font-family: 'DM Mono', monospace;
    }

    /* ===== STATS ROW ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat-card {
      background: #fafaf9;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 14px;
      padding: 16px 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    .stat-label {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace;
    }

    .stat-card h4 {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }

    /* ===== MAIN GRID ===== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 20px;
    }

    /* ===== CARDS ===== */
    .info-card,
    .activity-card {
      background: #fafaf9;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px;
      padding: 24px 22px;
      min-height: 280px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .info-card:hover,
    .activity-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace;
      margin-bottom: 18px;
    }

    /* ===== INFO CARD ===== */
    .info-card p {
      margin: 10px 0;
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .info-card p strong {
      color: #222;
      font-weight: 600;
    }

    /* ===== ROLE BADGE ===== */
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }

    .role-user       { background: #e9f3ff; color: #2b6cb0; }
    .role-admin      { background: #fff4e5; color: #b7791f; }
    .role-superadmin { background: #fde8e8; color: #c53030; }

    /* ===== LOGOUT BTN ===== */
    #logoutBtn {
      margin-top: 20px;
      padding: 9px 18px;
      border: none;
      border-radius: 9px;
      background: #8f2c24;
      color: #fff;
      font-weight: 500;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(143,44,36,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #logoutBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(143,44,36,0.3);
    }

    /* ===== ACTIVITY CARD ===== */
    .activity-card ul {
      list-style: none;
      padding-left: 20px;
      position: relative;
      margin-top: 4px;
    }

    /* timeline line */
    .activity-card ul::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: #e8e4e0;
    }

    .activity-card li {
      position: relative;
      padding-left: 14px;
      padding-bottom: 14px;
      margin-bottom: 0;
      line-height: 1.5;
      border-radius: 8px;
      transition: all 0.18s ease;
    }

    /* dot */
    .activity-card li::before {
      content: "";
      position: absolute;
      left: 0px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c0392b;
      box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
    }

    .activity-card li:not(:last-child) {
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .activity-card li:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .activity-card li:hover {
      background: rgba(0,0,0,0.03);
      transform: translateX(3px);
      border-radius: 8px;
    }

    .activity-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .activity-action {
      font-size: 13px;
      font-weight: 500;
      color: #2b2b2b;
    }

    .activity-time {
      font-size: 11px;
      color: #aaa;
      font-family: 'DM Mono', monospace;
    }

    /* ===== EMPTY STATE ===== */
    .no-activity {
      list-style: none;
      padding: 40px 0;
      margin: 0;
      text-align: center;
      color: #bbb;
      font-size: 14px;
    }

    .no-activity::before,
    .no-activity::after { display: none !important; }

    .activity-card ul:has(.no-activity)::before { display: none !important; }

    .activity-card ul:has(.no-activity) {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
    }

    .empty-text {
      width: 100%;
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 40px 0;
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body { padding: 20px 14px; align-items: flex-start; }
      .dashboard-container { padding: 28px 20px; border-radius: 18px; }
      .profile-text h2 { font-size: 20px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-card:last-child { grid-column: span 2; }
      .dashboard-grid { grid-template-columns: 1fr; gap: 14px; }
      .info-card, .activity-card { min-height: auto; }
    }
    @media (max-width: 480px) {
      .dashboard-container { padding: 22px 16px; }
      .stats-row { grid-template-columns: 1fr; }
      .stat-card:last-child { grid-column: span 1; }
      .profile-text h2 { font-size: 18px; }
      .avatar { width: 44px; height: 44px; font-size: 18px; }
    }
  </style>
</head>

<body>
  <div class="dashboard-container">

    <!-- TOP SECTION -->
    <div class="dashboard-top">
      <div class="profile-header">
        <div class="avatar" id="avatar">T</div>
        <div class="profile-text">
          <h2 id="username">Welcome</h2>
          <span class="profile-sub">User Dashboard</span>

          <!--health check-->>
          <div id="systemStatus" style="
            margin-top:6px;
            font-size:12px;
            font-family:'DM Mono', monospace;
            color:#888;">
            Checking system...
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Account Age</span>
          <h4 id="accountAge">--</h4>
        </div>
        <div class="stat-card">
          <span class="stat-label">Last Active</span>
          <h4 id="lastActive">--</h4>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Activities</span>
          <h4 id="totalActivities">--</h4>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="dashboard-grid">

      <!-- ACCOUNT INFO -->
      <div class="info-card">
        <div class="card-title">Account Info</div>

        <p>
          <strong>Role:</strong>&nbsp;
          <span id="roleBadge" class="role-badge"></span>
        </p>
        <p>
          <strong>Account Created:</strong><br>
          <span id="created"></span>
        </p>
        <p>
          <strong>Last Login:</strong><br>
          <span id="lastLogin"></span>
        </p>

        <button id="logoutBtn">Logout</button>
      </div>

      <!-- RECENT ACTIVITY -->
      <div class="activity-card">
        <div class="card-title">Recent Activity</div>
        <ul id="activityList"></ul>
      </div>

    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
