<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UserSphere | Admin Dashboard</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0e1520;
      --surface2:  #131c2e;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --text:      #e2e8f0;
      --muted:     #64748b;
      --green:     #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 0%, rgba(99,102,241,0.06) 0%, transparent 50%);
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--green);
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .logs-btn {
      padding: 7px 16px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(99,102,241,0.1);
      color: #818cf8;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .logs-btn:hover {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.5);
    }

    .logout-btn {
      padding: 7px 16px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--border2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      margin-top: 8px;
      letter-spacing: -0.5px;
    }

    .stat-card.flash {
      animation: cardPulse 0.9s ease-in-out;
    }

    @keyframes cardPulse {
      0%   { border-color: var(--border); }
      40%  { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 20px rgba(99,102,241,0.2); }
      100% { border-color: var(--border); }
    }

    /* TABLE */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-header h2 {
      font-size: 14px;
      font-weight: 500;
    }

    .user-count {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 12px 24px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 14px 24px;
      font-size: 13px;
      vertical-align: middle;
    }

    .user-name { font-weight: 500; }

    .user-email {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    /* ROLE BADGES */
    .role-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
    }

    .role-user       { background: rgba(59,130,246,0.1);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
    .role-admin      { background: rgba(234,179,8,0.1);   color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); }
    .role-superadmin { background: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .btn {
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .btn-promote {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border-color: rgba(59,130,246,0.2);
    }
    .btn-promote:hover {
      background: rgba(59,130,246,0.2);
      border-color: rgba(59,130,246,0.4);
    }

    .btn-demote {
      background: rgba(234,179,8,0.1);
      color: #fbbf24;
      border-color: rgba(234,179,8,0.2);
    }
    .btn-demote:hover {
      background: rgba(234,179,8,0.2);
      border-color: rgba(234,179,8,0.4);
    }

    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border-color: rgba(239,68,68,0.2);
    }
    .btn-delete:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.4);
    }

    .btn-disabled {
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      border-color: var(--border);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .loading-row td {
      color: var(--muted);
      text-align: center;
      padding: 32px;
      font-style: italic;
    }
    /* ===== RESPONSIVE ===== */
    .scroll-hint {
      display: none;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 6px;
      font-family: 'DM Mono', monospace;
      border-bottom: 1px solid var(--border);
    }

    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 768px) {
      body { padding: 20px 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
      .header-left h1 { font-size: 18px; }
      .header-right { width: 100%; justify-content: space-between; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
      .stat-value { font-size: 22px; }
      .table-section { overflow: hidden; }
      table { min-width: unset; width: 100%; }
      td, thead th { padding: 10px 12px; }
      .btn { padding: 4px 8px; font-size: 11px; }
      .actions { flex-wrap: wrap; gap: 4px; }
      thead th:nth-child(2), tbody td:nth-child(2) { display: none; }
      .user-name { white-space: nowrap; }
      .role-badge { white-space: nowrap; }
    }
    @media (max-width: 480px) {
      .header-left h1 { font-size: 16px; }
      .status-pill { font-size: 11px; padding: 4px 10px; }
      .logs-btn { font-size: 12px; padding: 6px 12px; }
      .logs-btn {
      padding: 7px 16px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(99,102,241,0.1);
      color: #818cf8;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .logs-btn:hover {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.5);
    }

    .logout-btn { font-size: 12px; padding: 6px 12px; }
      .user-name { font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <h1>Admin Dashboard <span id="adminRoleBadge"></span></h1>
        <div class="breadcrumb">UserSphere / admin</div>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          <span id="status">Loading...</span>
        </div>
        <a href="admin-logs.html" class="logs-btn">View Logs</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="statUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Admins</div>
        <div class="stat-value" id="statAdmins">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Super Admins</div>
        <div class="stat-value" id="statSuperAdmins">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Logs</div>
        <div class="stat-value" id="statLogs">0</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-section">
      <div class="table-header">
        <h2>All Users</h2>
        <span class="user-count" id="users">— users</span>
      </div>
      <div class="scroll-hint" id="scrollHint">← swipe to see actions →</div>
      <div class="table-scroll-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr class="loading-row"><td colspan="4">Loading users...</td></tr>
        </tbody>
      </table>
      </div>
    </div>

  </div>

  <script src="js/admin.js"></script>
</body>
</html>
